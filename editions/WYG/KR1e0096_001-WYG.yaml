body:
  text: 左傳杜解補正卷上崑山顧炎武撰北史言周樂遜著春秋序義通賈服說發杜氏違今杜氏單行而賈服之書不傳矣吳之先達邵氏寳有左觽百五十餘條又陸氏粲有左傳附注傅氏遜本之為辨誤一書今多取之參以鄙見名曰補正凡三卷若經文大義左氏不能盡得而公穀得之公穀不能盡得而啖趙及宋儒得之者則别記之於書而此不具也東吳顧炎武隱元年莊公寤生驚姜氏解寐寤而莊公已生恐無此事應劭風俗通曰兒墮地能開目視者為寤生不如早為之所解使得其所宜改云言及今制之未嘗君之羮解食而不啜羮非也改云爾雅肉謂之羮弔生不及哀杜氏主短喪之說每於解中見之謂既葬除喪諒闇三年非也改云不當既封反哭之時二年莒人入向解譙國龍亢縣東南有向城非也於欽齊乘言今沂州西南一百里有向城鎭桓十六年城向宣四年公及齊侯平莒及郯莒人不肯公伐莒取向襄二十年仲孫速會莒人盟於向杜氏於宣四年解曰向莒邑東海承縣東南向城逺疑也按春秋向之名四見於經而杜氏解為二地然其實一向也先為國後并於莒而或屬莒或屬魯則以攝乎大國之間耳龍亢在今鳯陽之懷逺尤逺惟沂州之向城近之三年蘋蘩藴藻之菜玉篇蕰於粉切菜也毛晃曰蕰亦水草四年老夫耄矣曲禮大夫七十而致事自稱曰老夫五年曲沃莊伯以鄭人邢人伐翼解邢國在廣平襄國縣按此解宜移在上年衞人逆公子晉於邢之下使曼伯與子元潛軍軍其後無解子元疑即厲公之字昭十一年申無宇之言曰鄭莊公城櫟而寘子元焉使昭公不立杜以為别是一人厲公因之以殺曼伯而取櫟非也盖莊公在時即以櫟為子元之邑如重耳之蒲夷吾之屈故厲公於出奔之後取之特易曼伯則為昭公守櫟者也九年公子突請為三覆以敗戎桓五年子元請為二拒以敗王師固即厲公一人而或稱名或稱字耳合三事觀之可以知厲公之才略而又資之以巖邑能無簒國乎諸侯用六解曰六六三十六人東坡志林引宋書樂志文帝元嘉十五年給彭城王義康舞伎三十六人太常傅隆以為左傳諸侯用六杜預以為三十六人非是舞所以節八音故必以八人為列自天子至士降殺以兩兩者減其二列爾若如預言至士止有四人豈復成樂服䖍注左傳與隆同襄十一年晉悼公納鄭女樂二八以一八賜魏絳此樂以八人為列之證隆言是也未及國解忿公知而故問責窮辭按此非人情改云使者未知公之聞入郛諱之不以實告叔父有憾於寡人按僖伯孝公之子惠公之弟故曰叔父杜解諸侯稱同姓大夫長曰伯父少曰叔父此乃通稱之辭當移在莊十三年上大夫之事吾願與伯父圖之之下七年戎伐凡伯于楚丘以歸此非僖二年所城之楚丘解曰衞地非也其曰在濟隂成武縣西南則是也春秋時為曹地八年諸侯以字為諡因以為族陸氏按鄭康成駮許叔重五經異義引此傳文云諸侯以字為氏今作諡者傳寫誤也朱子曰以字為氏如鄭之國氏本子國之後駟氏本子駟之後下云公命以字為展氏是也十一年鄭伯使卒出豭行出犬雞以詛射潁考叔者佯為不知而使軍士詛之立桓公而討寪氏有死者解欲以弑君之罪加寪氏而復不能正法誅之傳言進退無據改云言非有名位之人盖微者爾如司馬昭族成濟之類桓公二年臧孫達其有後於魯乎補云達哀伯名莊十一年臧孫達是也其弟以千畆之戰生解西河界休縣南有地名千畆非也穆侯時晉境不得至界休按史記趙世家周宣王伐戎及千畆戰正義曰括地志云千畆原在晉州岳陽縣北九十里五年蔡人衞人陳人從王伐鄭解王師敗不書不以告非也改云王師敗不書不可書也為尊者諱六年親其九族孔氏書𫝊曰九族髙祖至𤣥孫之親遂辭諸鄭伯邵氏曰娶妻必告父母故告諸鄭伯而辭之杜氏以為假父之命非接以太牢解以禮接夫人傅氏曰以太牢之禮接見太子不以國解國君之子不自以本國為名焉有君之子而自名其國者乎改云若定公名宋哀公名蔣以國則廢名解國不可易故廢名非也謂若秦莊襄王名楚改楚為荆與吾同物史記魯世家與桓公同日八年楚人上左君必左無與王遇君謂隨侯王謂楚王兩軍相對隨之左當楚之右言楚師左堅右瑕君當在左以攻楚之右師李雲霑曰桓公五年繻葛之戰鄭子元請為左拒以當蔡人衞人為右拒以當陳人是以左當其右右當其左之證也耒按此說雖巧然玩傳文語勢君字仍指楚君為當十一年鄭忽出奔衞解鄭人賤之以名告非也盖未成君之辭十三年及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績解或稱人或稱師史異辭也改云燕獨稱人其君不在師解又云衞宣公未葬惠公稱侯以接鄰國非禮也案春秋諸侯踰年即位則得稱君如宣十一年楚子陳侯鄭伯盟於辰陵是時靈公被弑賊未討君未葬已稱陳侯是踰年稱君古之常例也十五年鄭世子忽復歸於鄭解云逆以太子之禮非也忽未踰年而出奔奔四年而復國未即位不得成之為君曰世子者當立之辭也莊元年三月夫人孫于齊補云次年有會禚之文則不乆而復還於魯其不書還盖夫子削之不稱即位文姜出故也解文姜未還據下夫人孫于齊則固在魯矣改云繼弑君不書即位臣子之情所不􅃘也左氏未得其㫖而見下有夫人孫于齊之文所謂縁此不􅃘書耳絶不為親禮也劉原父曰謂魯人絶文姜不以為親乃中禮爾然則母可絶乎宋襄之母獲罪於君歸其父母之國及襄公即位欲一見之而義不可得作河廣之詩以自悲然宋襄亦不迎而致也為嘗獲罪於先君不可以私廢命也孔子論其詩而著之以為宋姬不為不慈襄公不為不孝今文姜之罪大絶不為親何傷於義哉二年夫人姜氏會齊侯於禚解夫人行不以禮故還皆不書非也夫人之禮降於君故書行不書還史之舊文六年不知其本不謀知本之不枝弗强不謀猶言失計不知黔牟之不足與立是不謀也知其為君之孤立而無助則不能自强而有其國矣按弗强言不必强立之也八年夏書曰臯陶邁種德德乃降今書大禹謨十二年蕭叔大心解蕭叔大夫名按大心當是其名而叔其字亦非蕭大夫也二十三年蕭叔朝公解曰蕭附庸國叔名按唐書宰相世系表云宋戴公生子衎字樂父裔孫大心平南宫長萬有功封于蕭以為附庸今徐州蕭縣是也其後楚滅蕭手足皆見補云言萬力能決犀十四年傅瑕貳解有二心於己傅氏曰如此則漢祖之斬丁公也在厲公當不然矣改云雖納我仍有二心先君桓公命我先人典司宗祏解見哀十六年莊公之子猶有八人解莊公子傳唯見四人子忽子亹子儀並死獨厲公在八人名字記傳無聞按猶有八人者謂除此四人外尚有八人見在也桓十四年鄭伯使其弟語來盟傳稱其字曰子人亦其一也二十一年鄭伯享王於闕西辟補云辟偏也二十二年夏五月補云書五月史闕誤翹翹車乘解曰翹翹逺貌傅氏曰髙貌按詩翹翹錯薪錢氏曰翹翹髙竦貌此於車乘亦當訓髙山嶽則配天解得太嶽之權則有配天之大功改云詩曰崧髙維嶽駿極於天言天之髙大惟山嶽足以配之二十五年夏六月辛未朔日有食之鼓用牲于社非常也唯正月之朔慝未作日有食之於是乎用幣於社伐鼓於朝周之六月夏之四月所謂正月之朔也然則此其常也而曰非常者何盖不鼓於朝而鼔於社不用幣而用牲此所以謂之非常禮也杜氏不得其說而曰以長厯推之是年失閏辛未實七月朔非六月也此則咎在司厯不當責其伐鼓矣又按唯正月之朔以下乃昭十七年季平子之言今載於此或恐有誤二十八年小戎子生夷吾解小戎允姓之戎子女也陸氏曰據傳云允姓之姦居於瓜州自惠公始誘以來則此非允姓别一戎而子則其姓爾狄之廣莫於晉為都解謂遣二公子出都之非也都者大邑之名隱元年傳曰大都不過參國之一是也傅氏曰以狄地之曠絶而在晉則為都其威逺樹宜闢土之廣晉人謂之二五耦言相比為奸也古人共耕曰耦共射亦曰耦僖九年傳曰耦俱無猜此解云墾傷晉室太巧三十二年狄伐邢邢解已見隱五年此重出城小榖為管仲也小榖不繫齊疑左氏誤范甯解榖梁傳曰小榖魯邑春秋發微曰曲阜西北有故小榖城按史記漢髙帝以魯公禮葬項王榖城當即此地杜解以此小榖為齊邑濟北榖城縣城中有管仲井劉昭郡國志酈道元水經注皆同按春秋有言榖不言小者莊二十三年公及齊侯遇於榖僖二十六年公以楚師伐齊取榖文十七年公及齊侯盟於榖成五年叔孫僑如會晉荀首於榖四書榖而一書小榖别於榖也又昭十一年傳曰齊桓公城榖而寘管仲焉至於今賴之則知春秋四書之榖及管仲所封在濟北榖城而此之小榖自為魯邑爾况其時齊桓始霸管仲之功尚未見於天下豈遽勤諸侯以成其私邑哉而以夫人言許之以夫人言為句公語以立之為夫人也許之孟任許公也能投盖于稷門當從劉炫之說以盖為車盖正義謂車盖輕而帆風非可投之物不知投重物易髙投輕物而使之髙則其人為有力矣漢書上官桀傳從武帝上甘泉天大風車不得行解盖授桀桀奉盖雖風常屬車雨下盖輒御事亦類此子般即位次于黨氏補云盖適母家也閔元年安而能殺補云國語曰車有震武也震有威武之象故曰殺二年立戴公以廬於曹補云曹詩作漕鄭志答張逸曰漕邑在河南今大名府滑縣南二十里有白馬故城是也君失其官解太子統師是失其官也改云失官人之道用其衷則佩之度劉奉世曰佩之合法度也記云世子佩瑜玉而綦組綬尨涼冬殺金寒玦離林氏曰衣之尨雜則有涼薄之意命以窮冬則有肅殺之意金屬秋方其性剛而寒玦如環而缺離不相連屬金玦不復補云人臣賜玦則去故曰不復内寵並后外寵二政嬖子配適大都耦國解驪姬為内寵二五為外寵奚齊為嬖子曲沃為大都按曲沃即申生所居豈可謂其生亂乎陸氏曰古人引言但取大意不必事事符同秪取内寵嬖子二事今從之改曰驪姬寵奚齊嬖亂之本也與其危身以速罪也補云國語申生敗狄于稷桑而反讒言益起衞文公大布之衣大帛之冠解云盖用諸侯諒闇之服非也陸氏曰言其儉樸僖元年公敗邾師於偃虛丘之戍將歸者也魯與邾之尋師多矣詐而敗其戍兵不必為哀姜故也解鑿二年冀為不道入自顚軨伐鄍三門服䖍謂鄍晉邑也冀伐晉虞助晉人伐冀師故言冀之既病則亦惟君故將假道故稱前恩以誘之其說為長按此兩言自指冀之伐虞觀下文稱侵敝邑南鄙語氣自别杜說未可非况鄍與顛軨皆為虞地可考乎保於逆旅以侵敝邑之南鄙邵氏曰逆旅近晉南鄙之客舍也出則侵退則保晉里克荀息帥師會虞師伐虢解晉猶主兵不信虞按請先伐虢者為之導也晉以師會之未見晉不信虞之意解可刪四年昭王南征而不復寡人是問解不知其故而問之非也改云齊侯以為楚罪而問之共其資糧屝屨解屝草屨按劉熙釋名齊人謂韋屨曰屝五年憂必讎焉讐應也如詩言無言不讐之讐漢書律厯志注鄭德云相應為讐孔叔止之孔叔解已見三年此重出輔車相依脣亾齒寒此二句一意乃是諺語吕氏春秋宫之奇諫曰虞之有虢也若車之有輔也車依輔輔亦依車虞虢之勢是也注車牙也輔頰也與杜氏同牙車字出素問太伯不從不從者謂太伯不在太王之側爾史記述此文曰太伯虞仲太王之子也太伯亾去是以不嗣以亾去為不從其義甚明杜氏誤以不從父命為解而後儒遂傅合魯頌之文謂太王有翦商之志太伯不從此與秦檜之言莫須有者何以異哉周書曰皇天無親惟德是輔今書蔡仲之命又曰黍稷非馨明德惟馨今書君陳又曰民不易物惟德繄物今書旅獒均服振振漢書五行志作袀服師古曰袀服黒衣吳都賦六軍袀服六年後出同走罪也史記述冀芮之言曰重耳已在矣今徃晉必移兵伐翟翟畏晉禍且及左氏文簡非此數語不明杜解非圍新宻鄭所以不時城也實密而經云新城故傳釋之以為鄭懼齊而新築城因謂之新城也解云鄭以非時興土功齊桓聲其罪以告諸侯夫罪孰大於逃盟者而更責其非時興土功不亦細乎且上文固曰以其逃首止之盟則不煩添此一節矣七年申侯申出也補云盖楚女嫁于申所生作而不記傳云無國不記解乃云齊史隱諱非也改曰不記言不可記八年不殯於廟邵氏曰殯於廟謂啓殯而朝祖也凡柩行而止皆謂之殯九年以是藐諸孤藐小也能欲復言而愛身乎補云言欲踐其言自不得愛其身晉郤芮使夷吾重賂秦以求入郤芮解宜在六年伐屈條下十年帝許我罰有罪矣傅氏曰有罪謂烝于賈君十二年王曰舅氏余嘉乃勲應乃懿徳謂督不忘徃踐乃職無逆朕命按此數語與書微子之命相類從書作曰篤不㤀較明古字通用或傳訛未可知也管氏之世祀也宜哉史記索隱曰世本云莊仲山生敬仲夷吾夷吾生武子鳴鳴生桓子啓方啓方生成子孺孺生莊子盧盧生悼子其夷其夷生襄子武武生景子耐步耐步生微十五年卜徒父筮之解卜人而用筮不能通三易之占非也卜徒父秦之卜人兼掌筮者周禮大卜掌三兆三易三夢之法是古之筮皆兼掌於卜人也涉河侯車敗解秦伯之軍涉河則晉侯車敗非也秦師及韓晉尚未出何得言晉侯車敗當是秦伯之車敗故穆公以為不祥而詰之耳涉河侯車敗五字乃事實非卜人之言也如石門之盟鄭伯之車僨于濟春秋時固常有是事今特泥下文不敗何待之語謂是晉車敗不知古人用字自不相䝉况下文又曰愎諫違卜固敗是求豈亦是車敗乎三敗及韓當依疏引劉炫之說是秦伯之車三敗千乘三去三去之餘獲其雄狐邵氏曰千乘侯國之車數也去猶算法所謂除也一除則三百三十三二除則六百六十六三除則九百九十九三除之餘所剰惟一非君而何按此與成十六年南國䠞射其元王中厥目並是夏商之占如連山歸藏之類故不言易一夫不可狃况國乎廣韻狃相狎也言一夫尚不可狎况以吾晉國之衆乎入而未定列解列位也陸氏曰謂師之伍列以太子罃𢎞與女簡璧登臺而履薪焉傅氏曰履薪示欲自焚瑕吕飴甥吕氏也瑕其邑名如成元年瑕嘉之瑕盖兼食瑕隂二邑非姓也敗于宗丘劉熙釋石曰宗丘邑中所宗也先君之敗徳及可數乎史蘇是占勿從何益解以數為象數之數恐非言先君之敗徳及今言之其可悉數乎雖有史蘇之占而獻公心志昏亂不從其言亦何益也是則敗亾之禍人實為之矣或曰獻公從史蘇之言其可免乎曰此韓簡就惠公所問而言其意以敗徳為主不在穆姬一事也抑考國語獻公勝國得妃史蘇告以不吉然則史蘇之為人固能以卜筮諌者與傅氏曰先君以敗徳致咎史蘇之占從不從皆無益也古文語急故略其字耳亦通十六年是隂陽之事非吉凶所生也吉凶由人傅氏曰言隂陽順逆為吉凶之兆而非吉凶之所由生吉凶由於人之善惡所感必先有以感之而後見於兆譏襄公不修人事而徒問物變十八年狄師還解云邢留距衞非也狄强而邢弱邢從於狄而伐者也言狄師還則邢可知矣下年衞人伐邢盖憚狄之强不敢伐而獨用師於邢也解云邢不速退所以獨見伐亦非十九年齊桓公存三亾國以屬諸侯解三亾國魯衞邢疑魯是大國且特内亂未嘗亾也傅氏曰三亾國邢衞把義士猶曰薄德言其德不若古聖王得死為幸得死猶云考終二十二年大司馬固諌曰大司馬即司馬子魚也固諫堅辭以諫也隱三年言召大司馬孔父而屬殤公焉桓二年言孔父嘉為司馬知大司馬即司馬也文八年上言殺大司馬公子卬下言司馬握節以死知大司馬即司馬也定十年公若藐固諫知固諫之為堅辭以諫也杜以固為名謂莊公之孫公孫固者非朱鶴齡曰按史記宋世家則前後俱子魚之言弗可赦也已猶書言不可逭傅氏曰言違天天必不宥注以赦為赦楚非三軍以利用也利用猶云弧矢之利注云為利興非金鼔以聲氣也聲如金聲而玉振之之聲劉用熙曰聲宣也宣倡士卒之勇氣戎事不邇女器傅氏曰戎事尚嚴不近女子所御之物况使婦人至軍中又示以俘馘乎二十三年其人能靖者與有幾邵氏曰此倒語也若曰其有幾人能靖者與陸氏釋文與字絶句策名委質解名書於所臣之策屈膝而君事之疏云質形體也謂拜而屈膝委身體於地也傅氏曰質古贄字管子令諸侯之子將委質者皆以雙虎之皮晉語臣委質於翟之鼔韋昭注質贄也士贄以雉是凡言委質皆委贄也愚按孟子出疆必載質庶人不傳質為臣皆是贄字赴以名則亦書之不然則否辟不敏也疑此三句俱謂未同盟者盖恐不審其實而有誤故不書名史氏之體也聞其駢脅程大昌曰駢者脅骨之生兩兩相竝也若以相夫子必反其國當讀至夫子為句夫子即公子按此陸氏說也玩文勢仍當從杜以相句絶二十四年晉侯夷吾卒疑此錯簡當在二十三年之冬傳曰九月晉惠公卒晉之九月周之冬也使殺懐公于髙梁髙梁解見九年此重出實紀綱之僕傅氏曰言其可任晉侯求之不獲以緜上為之田之推既隱求之不得未幾而死乃以田禄其子爾楚辭九章云思乆故之親身兮因縞素而哭之明文公在時之推已死史記則云聞其入緜上山中於是環緜上山中而封之以為介推田號曰介山然則受此田者何人乎於義有所不通矣杜解西河界休縣有地名緜上今按緜上又見襄十三年定六年疑是近絳之地昔周公弔二叔之不咸按魏陳思王表曰昔周公弔管蔡之不咸是則二叔謂管叔蔡叔也但下有封建之云首列管蔡故杜氏以為夏殷之叔世昭六年三辟之興皆叔世也古人以末世謂之叔季國語史蘇以桀紂及幽王為三季之王召穆公思周徳之不類故糾合宗族於成周而作詩常棣之詩序以為周公之作而此文則以為召穆公盖各有所傳不必同也棄嬖寵而用三良解引殺子華未當古人只是大槩言耳又以用三良為尊賢亦未合正義曰此見鄭伯之賢王當尊之夏書曰地平天成今書大禹謨鄭伯與孔將鉏石甲父侯宣多省視官具于汜解省官司具器用傅氏曰官官司具器具較眀二十五年冬十有二月癸亥公會衞子莒慶盟于洮衛文公已葬成公稱子者未踰年也春秋之例踰年即位然後稱公文十八年六月癸酉葬我君文公冬十月子卒是稱爵稱子繫乎踰年未踰年而不在乎葬與未葬也解誤王章也言天子之典章二十六年室如懸罄罄國語作磬韋昭解府藏空虛但有榱梁如懸磬也傅氏曰禮記磬于甸人注引此傳文正作磬太師職之太師周之太師主司盟之官解云太公為太師非二十八年距躍三百曲踊三百邵氏曰躍踊者皆絶地而起所謂跳也距躍直跳也曲踊横跳也横跳必先直而旋故不曰横而曰曲百音陌猶阡陌之陌也三陌盖躍踊之度大約有此楚子伏已而盬其腦范守己曰盬者苦鹽之名詩云王事靡盬勉之使無以為苦也晉侯夢楚子伏已而盬其腦當是以盬鹽揉入腦中故子犯曰我且柔之矣杜氏訓盬為啑非也出入三覲邵氏曰始至而見一覲也享醴受策二覲也去而辭三覲也晉侯聞之而後喜可知也古人多以見為知吕氏春秋文侯不說知於顔色注知猶見也殺士榮刖鍼莊子晉人殺之刖之也邵氏曰猶商君刑太子師傅之意甯子職納橐饘焉盖以饘寘橐中正義云橐以盛衣亦可盛食宣二年傳為簟食與肉寘諸橐以與之是也且使王狩邵氏曰凡天子之出皆曰狩古之狩猶今之幸也非田獵之狩也齊桓公為㑹而封異姓補云於齊則為異姓二十九年介葛盧聞牛鳴補云列子言東方介氏之國其人多解六畜之語者盖偏知之所得三十年行李之徃來古者謂行人為行李亦曰行理此與襄八年亦不使一介行李告於寡君並作李昭十三年行理之命無日不至作理國語周之秩官有之曰敵國賓至闗尹以告行理以節逆之賈逵曰理吏也小行人也漢李翕析里橋郙閣頌行理咨嗟若不闕秦將焉取之補云闕損也饗有昌歜白黒形鹽歜字誤玉篇作􅩃徂敢切菖蒲葅也三十二年勤而無所必有悖心言師勞力竭而無所用則所經之國必有背距之心解云將害良善未當按無所謂不知所徃何地所作何事也與上師知所為相反必有悖心言軍士將怨嗟也中壽李善文選注引養生經黃帝曰上壽百二十中壽百嵗下壽八十與正義同淮南子則云凡人中壽七十嵗三十三年晉人及姜戎敗秦師于殽解云不同陳故言及非也及者殊夷狄之辭晉人敗狄于箕解云太原陽邑縣有箕城陽邑在今之太谷縣疑襄公時未為晉境隕霜不殺草李梅實九月十月之交草木黃落之日而隕霜不殺草李梅實此洪範所謂恒燠者也解曰霜當微而重重而不能殺草非其為死君乎死君謂㤀其先君猶范鞅之言死吾父也秦不哀吾喪而伐吾同姓滑國者晉之同姓遂墨以葬文公晉於是始墨喪事有進無退已墨則不復反衰故遂墨以葬文公也後遂以墨為常則失禮甚矣盖以誇克敵之功猶楚之乘廣自邲之師而先左也葬僖公緩作主非禮也劉原父曰當以緩作主為一句此傳經書文二年二月丁丑作僖公主之義卒哭而祔祔而作主今僖公以文元年四月葬二年二月始作主過祔之期左傳杜解補正卷上
