body:
  text: 左傳杜解補正卷下崑山顧炎武撰昭元年商有姺邳竹書紀年外壬元年邳人姺人叛河亶甲三年彭伯克邳五年姺人入于班方彭伯韋伯伐班方姺人來賓令尹自以為王矣何如大明之首章曰天位殷適使不挾四方子皮賦野有死麕之卒章趙子常曰厖以喻楚諸侯惡楚公子圍故欲趙孟安徐馴擾之歸取酬幣終事八反傅氏曰此盖度其道里以次第舎車各預置酬幣於車中復計其逺近使之先日續發約享日仍以每享次第而至國於天地有與立焉其先世必有大功徳於民鮮不五稔言少有不至五年者請皆卒自我始盖古未有此法遷實沈于大夏解大夏今晉陽縣定四年命以唐誥而封于夏虚解夏虚大夏今太原晉陽也按晉之始見春秋其都在翼今平陽府翼城縣也括地志故唐城在絳州翼城縣西二十里堯裔子所封所謂成王滅唐而封大叔者也北距晉陽七百餘里即後世遷國亦逺不相及况自霍山以北皆戎狄之地自悼公以後始開縣邑而前此不見於傳又史記晉世家曰成王封叔虞於唐唐在河汾之東方百里翼城正在二水之東而晉陽在汾水之西又不相合竊疑唐叔之封以至侯緡之滅並在於翼史記屢言禹鑿龍門通大夏正義引括地志云大夏今并州晉陽及汾絳等州是然則杜氏專指晉陽者非也吕氏春秋言龍門未闢吕梁未鑿河出孟門之上則所謂大夏者正今晉絳吉隰之間也封禪書齊桓公西伐大夏考之於傳則曰至髙梁而還髙梁在今臨汾縣四姬有省猶可省減也解非中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也傅氏曰樂有五聲宫商角徴羽其相生大小之次皆有節焉先王所以成樂而用之以節百事其遲速本末皆有倫序以及於中五聲固本以黄鍾為宫然還相為宫則其餘十一律皆可為宫宫必為君而不可下於臣商必為臣而不可上於君角民徵事羽物皆以次降殺其有臣過君民過臣事過民物過事者則不用正聲而以半聲應之是為五降五降得其節則八音克諧無相奪倫而可彈若自五降而後則非復正聲如鄭衞之樂君子弗聽故不容彈周禮凡建國禁其淫聲過聲凶聲慢聲光武使桓譚鼓琴而好其煩聲宋𢎞所惡者是也女陽物而晦時女隂也隂中有陽其物屬火故為陽使后子與子干齒傅氏曰齒猶齊列也庚戍卒終穆叔劉定公秦后子之言二年敢辱大館解敢不敢當移在敢辱郊使之下國則不共而執其使言齊國不共非使人之罪解非三年今嬖寵之喪不敢擇位而數於守適數列也音色主反此其極也能無退乎張趯之言止此傳於下文因言晉衰將失諸侯故二大夫退而大叔稱之諸侯求煩不獲言所求日煩而諸侯不能應也解非按求煩不獲言欲煩而不可得也其猶在君子之後乎言庶幾可以為君子也盖人臣雖有諱國之禮然或憂其將亂而私語之於友不害為忠此叔向晏子之言所以不譏於君子也按言在君子之後是寓貶於褒也豆區釜鍾毛晃曰豆當音斗後人誤作俎豆之豆用之考工記一獻而三酬則一豆矣豆古斗字民人痛疾而或燠休之王若虛曰燠温煦安息之意以樂慆憂傅氏曰慆慢也以淫樂而慢其憂禍遇懿伯之忌敬子不入懿伯惠伯之叔父而敬子之五從祖也陳可大曰忌忌日適及滕郊而遇此故敬子欲至次日乃入其或寢處我矣本上襄二十八年盧蒲嫳譬之如禽獸吾寢處之矣之語四年是以先王務修徳音以亨神人亨古享字晉君少安不在諸侯少安猶言少惰二十六年晏子對景公曰後世若少惰將焉用之言將用何為辭按杜解云焉用宋盟似得語氣火出而畢賦補云周禮夏頒冰秋無苦雨傅氏曰雨過白露時物得之則傷宋玉九辨所謂皇天淫溢而秋霖者也王使椒舉侍於後以規過陸氏曰規正㑹禮之失屬有宗祧之事於武城寡君將墮幣焉傅氏曰楚武城必有先君之廟故田獵以祭祭用幣畢瘞之故云墮幣也恨其後至託此為辭慶封唯逆命謂弑君不見既自見矣邵氏曰言叔孫不見仲於公而仲已自見公矣求之而至又何去焉傅氏曰牛寵任日乆􅂥卒不虞其惡之至此未喻其意而云求食可得無須去之五年舎中軍邵氏曰舎中軍毁三而為四也此季孫之志也故不曰作四軍而曰舎中軍中軍季孫之所有也中軍既舎則其勢不得不二不得不二則不得不四此季孫之志也豎牛禍叔孫氏使亂大從傅氏曰大從猶云亂大作盖不忍斥言殺其父耳民食于他民生於三而君食之今昭公不能養民而民食於三家不知有君按昭二十五年子家子曰政自之出乆矣隱民多取食焉正所謂民食於他也朝聘有珪享頫有璋傅氏曰朝聘皆以珪為信周禮公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧朝覲於王諸侯相見同之聘用圭璧其飾與君同其長各降君一等是圭璧兼用而獨言珪者據公侯伯言之也享頫朝聘之禮使執玉以授主國之君乃行享禮獻國之所有享獻也頫見也按行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼鄭𤣥云上公享王圭以馬享后璋以皮餘以次降此言璋者據上公享后言之也重之以睦陸氏曰睦於楚六年亂獄滋豐豐者繁多之意易曰豐多故七年為身無義而圖說從政有所反之以取媚也邵氏曰立以存絶不以厲所立在此所說在彼政者正也反之非正矣故或反之以媚於民人生始化曰魄解魄形也傅氏曰左氏所謂魄不專指形而言如下文所云魂魄能憑依於人及前所云奪伯有魄皆非形也說文曰魄隂神也韻書云魂神也陽也氣也魄精也隂也形也則形亦可以言魄而魄則不可以訓形矣昭十五年宋樂祁曰心之精爽是謂魂魄二卦皆云初卜得屯其彖曰利建侯次卜得屯初九其爻辭亦曰利建侯弱足者居屯初九爻辭曰磐桓利居貞昔人以居字為句魏明帝之徴管寧曰盤桓利居八年輿嬖袁克殺馬毁玉以葬輿嬖嬖大夫也掌君之乗車如晉七輿大夫之類馬陳侯所乗玉陳侯所佩殺馬毁玉不欲使楚人得之解非今在析木之津猶將復由鶴山魏氏曰由義如書盤庚若顛木之有由蘖木生條也九年魏駘芮岐畢駘詩作邰蒲姑商奄王氏曰說文䣍國在魯括地志兗州曲阜縣奄里即奄國之地肅慎燕亳王氏曰史記秦本紀寧公與亳戰亳王奔戎皇甫謐云西夷之國也后稷封殖天下封殖封厚蕃殖也雖戎狄其何有余一人言伯父猶然則戎狄亦無所憚矣陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亾楚克有之天之道也故曰五十二年漢書五行志說曰顓頊以水王陳其族也今兹歲在星紀後五年在大梁大梁昴也金為水宗得其宗而昌故曰五年陳將復封楚之先為火正故曰楚所相也天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五而合而隂陽易位故曰妃以五成然則水之大數六火七木八金九土十故水以天一為火二牡木以天五為土十牡土以天五為水六牡火以天七為金四牡金以天九為木八牡陽奇為牡隂耦為妃故曰水火之牡也火水妃也於易坎為水為中男離為火為中女盖取諸此也自大梁四嵗而及鶉火四周四十八嵗凡五及鶉火五十二年而陳卒亾火盛水衰故曰天之道也邵氏曰天一生水至地六乃成越五數矣故曰妃以五成膳宰屠蒯記作杜蕢學人舎業補云舎業謂不習樂又飲外嬖嬖叔外嬖嬖大夫職司察外事十年居其維首而有妖星焉解客星居𤣥枵之維首傅氏曰非也言婺女居於𤣥枵之維首而有妖星見焉戊子逢公以登補云逢公亦姜姓見國語彼雖不信聞我授甲則必逐我彼謂欒髙言雖不實有此事聞我授甲必不能容我公卜使王黒以靈姑銔率吉請斷三尺焉而用之戴氏疑以為旗不可斷三尺而用李雲霑曰此如芋尹無宇之斷王旌斷其斿也戰于稷稷地名七國時齊有稷下館用幣必百兩百兩必千人千人至將不行傅氏曰用車百乗則徒千人人衆則費廣將不能行必盡用以給之夫子知之矣我則不足言非知之難而行之難夫子知之以告我而我不能行此我之不足也難不慎也補云言不可不慎棄徳曠宗使其宗廟曠而不祀十一年楚子䖍誘蔡侯般補云楚子圍改名曰䖍然壅也壅如以土壅水積之多而後決之驟也是以無拯不可沒振邵氏曰出溺為拯凡溺皆難為力而没者為甚不可没振申無拯之意而極言之物以無親物人也十二年子産相鄭伯辭於享請免喪而後聽命晉人許之禮也子産能守喪制晉人不奪皆為得禮壺何為焉其以中儶也邵氏曰言壺何為焉而以其中為儶異今猶古也齊將何事言晉疆不異於昔齊將何所為乎解非遂入昔陽漢書地里志鉅鹿下曲陽應劭曰晉荀吳滅鼓今鼓聚昔陽亭是也此鼓之都而非肥都其曰在樂平沾縣尤誤正義載劉炫之辨甚明外强内温忠也和以率貞信也故曰黄裳元吉惠伯釋其義言蒯無以當之人臣剛彊以禦外温順以事主斯謂之忠秉堅貞之節而和以率之斯謂之信此所以為黄裳元吉也邵氏曰本卦為内之卦為外六五隂變為陽外彊也然本八也故曰内温供養三徳為善傅氏曰三徳忠信共也是四國者專足畏也劉炫據楚語陳蔡與不羮為三國秪有一不羮古四字積畫以成盖三之誤未知是否水經注汝水又東南流逕西不羮城南是有二不羮李雲霑曰按賈誼新書楚靈王問范無宇曰我欲大城陳蔡葉與不羮正合四國之數或是傳文脫葉字王是以獲沒於祗宫正義馬融云圻内游觀之宫按竹書紀年穆王元年作祗宫於南鄭式如玉式如金猶言如金如錫如圭如璧言令徳也形民之力而無醉飽之心蘇子瞻曰以民力從王事當如飲食適於饑飽之度而已若必至於醉飽則民不堪命易曰山下有雷頤君子以節飲食又曰節以制度不傷財不害民同一道也十三年圍固城克息舟城而居之竊意固城息舟城乃二城之名按傳書克邑未有書克某邑之城者固城息舟皆二字地名城而居之别為一句言築城而守之也依陳蔡人以國陸氏曰依陳蔡之衆以立國弃禮違命弃事神之禮同惡相求傅氏曰同惡謂同謀造亂之人如薳居蔓成然之屬無與同好傅氏曰言子干無黨於内齊桓晉文不亦是乎傅氏曰皆出亾因亂而入懐錦奉壺飲冰以蒲伏焉陸氏曰此夏之六月晉人以幕䝉季孫當不堪其熱故飲之以冰不當以為箭筩也十四年司徒老祁慮癸當從服氏說以二人為季氏家臣其請於南蒯亦稱臣者古人之謙辭耳史記髙祖紀注張晏曰古人相與言多自稱臣猶今人相與言自稱僕也十五年將禘於武公按此乃時禘記所謂春禘秋嘗之禘而非五年大祭追逺之禘也二十五年將禘於襄公定八年禘於僖公並同惟是閔二年吉禘於莊公解云三年喪畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘王一嵗而有三年之喪二焉禮為長子斬衰三年喪妻雖期年而傳曰父必三年然後娶逹子之志也是亦有三年之義在王雖無再娶之禮而其餘哀則同也一動而失二禮朱申曰謂求器宴樂十六年幾為之笑而不陵我言寧有幾次為之笑而不陵我者乎與十年傳幾千人而國不亾二十四年傳幾如是而不亾郢義同刑之頗類類當作纇二十八年解纇戾也立而無令名之患立立乎其位善哉子之言是不有是事其能終乎傅氏曰人情相與翫習恒不善其終惟有是警戒當能終於好十七年辰不集于房今𦙍征夫子將有異志不君君矣日者人君之表不救日食是有無君之心解非故使穆子帥師獻俘於文宫傅氏曰以告成事冬有星孛于大辰西及漢八月辰星在西方孛從其西過星東及漢其與不然乎邵氏曰其與語辭猶曰其諸十八年大人患失而惑又曰可以無學邵氏曰夫必多有是說而後及其大人言不學之俗自下始也患失􅂲違衆而失位也陸氏曰大人懼違衆而失位心志惑亂故徇流俗之說而亦曰可以無學解非振除火災振如振衣之振猶火之著於衣振之則去也過期三日陸氏曰大叔廟寢之間其庭小不便於蒐宜除大叔不忍毁廟故過期三日須子産見之而有後命也解非此傳與十二年鄭簡公卒將為葬除不毁游氏之廟乃是一事而傳誤重出又或以為葬或以為蒐許不專於楚鄭方有令政邵氏曰當是時許遷于葉矣然以舊國故不專心事楚以不專心事楚之許而不禮於方有令政之鄭鄭得晉助而伐之不難矣此所以欲遷許也許曰余舊國也先許遷而鄭得其地成十五年許靈公畏偪于鄭遷于葉鄭人因有舊許之地襄十年東侵及許是也解以為許先鄭封非十九年紡焉以度而去之釋文引裴松之注魏志云古人謂藏為去亦作弆漢書蘇武傳掘野鼠去􅋄實而食之師古曰去謂藏之也陳遵傳皆藏去以為榮師古曰去亦藏也魏志華佗傳去藥以待不祥臣松之案古語以藏為去禳之則彼其室也言淵固龍之室也豈能禳而去之二十年相從為愈愈於相從俱死使華寅肉袒執盖以當其闕傅氏曰肉袒示必死阿下執事傅氏曰阿下親附而卑下之齊侯疥遂痁正義曰疥當作痎四物七音傅氏曰四物律度量衡也七音以宫商角徴羽而加變宫變徵也二十一年吾小人可藉死而不能送亾亾字句二十二年無亢不衷以奬亂人舉而髙之曰亢不衷猶言不端犧者實用人人犧實難已犧何害邵氏曰自犧者實用人以下皆指人而言人犧則用在人故曰實難喻劉單之立王猛已犧則用舎在己故曰何害喻王自立子朝盖是時太子既卒廢立之謀生矣五月庚辰見王不待葬而見王子猛於朝毁其西南唐石經此下有子朝奔郊四字二十三年乃皆執之傅氏曰魯不直又將叛齊補云上年與齊盟先君之力可濟也先君謂周之先王書言昔我先君文王武王是也吳太子諸樊入郥吳子諸樊乃王僚之伯父不應太子與之同名且僚子尚幼此必諸樊之太子光正義亦以為傳寫之誤二十五年為父子兄弟姑姊甥舅昏媾姻亞以象天明陸氏曰言其親疏倫序比象於天文之行列也季氏介其雞吕氏春秋注介甲也作小鎧著雞頭也此之謂不能庸先君之廟解盖襄公别立廟陸氏曰周衰禮廢諸侯典祀盖有獨豐于昵者如閔二年禘於莊公趙匡曰不及於祖也今此禘于襄公亦然杜謂别立廟謬矣武宫煬公之立經皆書之即别立二公廟無緣不書事若不克君受其名言徒以虛名受禍使有司待於平隂為近故也近謂近魯平隂近魯野井近齊邵氏曰齊侯言為魯之故使有司先待於平隂將自徃迎之而魯侯已至於野井此寡人之罪也失魯而以千社為臣傅氏曰言臣千社之人二十六年萬民弗忍居王於彘劉炫曰不忍王之虐也解非諸侯釋位以間王政陸氏曰史記言厲王奔彘周公召公行政號曰共和非也漢書古今人表有共伯和師古曰共國伯爵和名汲冡紀年厲王十二年出奔彘十三年共伯和攝行天子事號曰共和二十六年王陟於彘周定公召穆公立太子靖為王共伯和歸其國又莊子稱共伯得乎共首司馬彪曰共伯名和諸侯知其賢請以為天子即王位十有四年大旱屋焚卜曰厲王為祟乃立宣王共伯復歸於宗逍遥得意於共山之首吕氏春秋曰共伯和其行好賢仁厲王之難天子曠絶而天下皆來請矣據此諸書所說皆同則釋位以間王政者共伯其人也攜王奸命解云幽王少子伯服朱鶴齡曰幽王在位十一年計伯服之生不過數歲而褒姒為犬戎所虜必無復立其子之理正義引汲冡紀年幽王既弑申侯魯侯及許文公立太子宜臼於申虢公翰立王子余臣於攜二王並立二十一年攜王為晉文侯所殺是攜王者余臣也按此則攜王之攜乃是地名猶厲王流彘詩人謂之汾王或以諡法怠政交外曰攜非也梁元帝用尚書左丞劉榖議諡其兄邵陵王綸為攜王取此名而義不同帥羣不弔之人傅氏曰好行禍亂不相弔恤之人二十七年延州來季子解宜在襄三十一年延州來季子其果立乎之下王可弑也母老子弱是無若我何史記曰王僚可弑也母老子幼而兩公子將兵伐楚楚絶其路外困於楚而内空無骨鯁之臣是無奈我何按傳下文云闔廬以其子為卿則解云欲以老弱託光是也鈹交於胷遂弑王鈹交於胷而鱄設諸不為之動所以能弑王也然鱄設諸亦死矣闔廬既立以其子為卿史竟言之國人投之遂弗爇也令尹炮之邵氏曰國人取菅秆投之而弗舉火令尹乃舉火然之事君如在國當時諸侯出奔其國即别立君惟魯不敢故昭公雖在外而意如猶以君禮事之使宰獻而請安燕禮司正命卿大夫以安皆享臣下之禮卑公也二十八年盂丙為盂大夫今本作孟丙者非漢書地理志云盂晉大夫盂丙邑以其為盂大夫而謂之盂丙猶魏大夫之為魏壽餘閻大夫之為閻嘉邯鄲大夫之為邯鄲午也其四人者皆受縣而後見於魏子言非素識二十九年人實不知非龍實知言人自無擾龍之術故不生得耳非龍之知也有烈山氏之子曰柱賈鄭皆云烈山炎帝之號遂賦晉國一鼓鐵以鑄刑鼎王肅家語注曰三十斤為鈞鈞四為石石四為鼓盖用四百八十斤鐵三十年共其職貢與其備御不虞之患備御不虞謂三軍之事雖士大夫有所不獲數矣言不得備數將自同於先王言欲自比于先周盛王若為三師以肄焉肄習也三十一年我受其無咎受猶任名之不可不慎也如是夫有所有名而不如其已傅氏讀至夫字為句言人以有名為貴又有所謂有名不如無名者按有所猶言有處也欲求名而不得或欲盖而名章王應麟曰欲求名而不得如向戌欲以弭兵為名而宋之盟其名不列焉或欲盖而名章如趙盾偽出奔崔杼殺太史將以盖弑君之惡而其惡益著焉推此類言之可見謹嚴之法求名非謂齊豹名章亦不止三叛也日月在辰尾傅氏曰辰尾居東吳在楚東故知必吳入郢也三十二年越得歲而吳伐之必受其凶吳越雖同星紀之分而所入宿度不同故歲獨在越屬役賦丈屬役屬所役人數定元年魏子涖政此即上年南面之事而傳再書之者兩收而失刪其一也盖周之正月為晉之十一月而庚寅即己丑之明日士彌牟既已分役豈有遲之兩月而始栽宋仲幾乃不受功者乎且此役不過三旬而畢矣二年以師臨我我伐桐為我使之無忌邵氏曰以師臨我我伐桐二我我舒鳩也為我使之無忌吳自我也盖吳將誘楚欲使之不忌吳於是桐適叛楚故使舒鳩人謂楚以師伐我我則伐桐如此者為我使之無忌也不然楚方忌吳安肯出師於近吳之地哉此致人之術所謂多方以誤之也按傳下文言楚囊瓦伐吳不言伐舒鳩則杜解為得又襄公二十五年楚已滅舒鳩矣四年蔡侯以吳子及楚人戰於柏舉傅氏曰柏舉楚地在今河南西平縣本柏子國嘖有煩言嘖爭言也管子有嘖室之議荀子嘖焉而不類命以伯禽孫寶侗曰於書當有伯禽之命而今逸之相土之東都相土商之先君鄭氏詩箋曰相土居夏后之世承契之業入為王官之伯出長諸侯其曰東都不可知為何地也密須之鼓密須解己見昭十五年此重出楚子取其妹季芈畀我以出服云畀我季芈之字下文但言季芈知非二人楚子渉睢濟江入於雲中傅氏曰雲中雲夢澤中盖江北之夢在今湖廣徳安府考睢漢二水皆入江楚子既渉睢而西復還入睢由睢而入江繞吳兵之南而北濟以入鄖自鄖而奔隨也解以為江南之夢非不敢以約為利陸氏曰不敢乗君父困約之時以為利五年卒於房房疑即防字古阝字作􅊟脫其下而為字漢仙人唐公碑可證也漢書汝南郡吳房孟康曰本房子國而史記項羽紀封揚武為吳防侯字亦作防漢書武帝紀濟川王明廢遷防陵常山王㪍廢徙房陵一卷之中字體不同又防房二字相通之一證大徳滅小怨傅氏曰大徳謂其弟懐初謀弑王故子西欲舎之王憐其念父以其兄有大功故并賞六年定之鞶鑑鞶鑑解己見莊二十一年此重出陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君恐晉隂厚之故為此言邵氏曰孟孫何為而遽誓哉見虎有不容之勢焉有不可言之惡焉而已有不得已之情焉欲晉君臣於言外得之而豫圖所以待之也凡誓辭曰有如日有如河有如先君云者若謂茍不如此將如日何如河何如先君何若謂其神臨之必降之禍也此所謂彊為之請以取入焉者也八年主人出師奔賈云主人出魯人奔郤衞人請執牛耳盟禮卑者執牛耳尊者涖之衞侯與晉大夫盟自以當尊故請晉執之渉佗捘衞侯之手及捥捘捉持之也捥腕同掌臂交曲處捘之上及於捥寡人從焉言事之九年子明謂桐門右師出劉用熙曰子明盖與右師同居逐之使出各居也東郭書讓登犂彌從之曰子讓而左我讓而右使登者絶而後下書左彌先下邵氏曰登登城也下既登而入城也左右非譎辭絶而後下乃譎辭也書與王猛息猛曰我先登書歛甲曰曩者之難今又難焉猛笑曰吾從子如驂之靳邵氏曰上言犂彌從之則書先登矣既登又讓下讓而左右不以先後彌為先下地也登絶後下此言亦然讓登爭先也讓下亦爭先也曩與犂彌既不得先難也今猛又言登之先是又難也如驂之靳則書曰先而猛略後焉所謂先先於衆非先於書也何難之有故笑而言之晳幘而衣貍製傅氏曰晳白晳幘以巾髪卑賤所服貍製狐皮之衣十年公㑹齊侯于祝其實夾谷在今萊蕪縣按杜解及史記服䖍注皆云在東海祝其縣今淮安府之贛榆逺非也水經注萊蕪縣曰城在萊蕪谷當路岨絶兩山間道由南北門舊說云齊靈公滅萊萊民播流此谷邑落荒蕪故曰萊蕪禹貢所謂萊夷也夾谷之㑹齊侯使萊人以兵刼魯侯宣尼稱夷不亂華是也是則㑹於此地故得有萊人非召之東萊千里之外也不可泥祝其之名而逺求之海上矣十三年衞是以為邯鄲而寘諸晉陽絶衞之道也邵氏曰寘諸邯鄲衞之意也寘諸晉陽非衞之意也故曰絶衞之道十四年使死士再禽焉不動傅氏曰禽如鷙鳥之發急持以衝其陳吳陳堅不可動哀元年死知不曠曠空也言不為徒死知上必有以恤之二年以兵車之斾與罕駟兵車先陳傅氏曰設斾於軍前盛為軍容與罕駟兵車在前者相對彼自後望之不知虛實故懼謀恊以故兆詢可也故兆始謀伐二子卜得吉兆趙孟喜曰可矣以范中行氏失援糧竭必將亾四年司馬起豐析與狄戎以臨上雒左師軍於菟和右師軍於倉野發二邑之兵與戎狄之衆以臨上雒而分軍為二以脅晉人使謂隂地之命大夫士蔑晉大夫守隂地者五年諸子鬻姒之子荼嬖諸子見襄十九年景公死乎不與埋三軍之事乎不與謀邵氏曰二不與皆指羣公子六年再敗楚師不如死劉炫曰前敗于柏舉若此戰更敗是再敗潛師閉塗史記司馬貞注曰閉塗即禮記所謂菆塗者謂匿其喪也惟彼陶唐帥彼天常有此冀方古文尚書五子之歌也今書無帥彼天常一句出萊門而告之故解魯郭門也按定九年解萊門陽闗邑門君舉不信羣臣乎悼公忌荼恐諸大夫復立荼而廢己欲使除之故僖子以為疑已七年周之王也制禮上物不過十二陸氏曰如冕如旂俱十二旒玉路繁纓十二就之類對曰禹合諸侯于塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎不樂而出傅氏曰大夫對以夏時諸侯以萬計惟大小相攻伐故胥以亾今背盟伐邾既不字小又不事大不相趨於亾乎何不言但言而不聽耳凡以兵加人徳足以勝之而後可今徳不過邾而伐之其可乎盖諸大夫皆以伐邾有吳患不能囘季孫之意故不樂杜解皆誤八年所託也則隱若已託於他國而臣事之雖不奔命猶為之隱諱魯雖無與立必有與斃言魯平時雖無黨急則必有共其患王犯嘗為之宰澹臺子羽之父好焉國人懼傅氏曰吳既克武城則其人以二子之故將固與吳吳得據之以為魯患故懼吳人行成此魯求成耳而言吳人行成者内外之辭十一年國書髙無㔻帥師伐我及清清解己見隱四年此重出有子曰就用命焉劉原父曰有子當為子有州仇奉甲從君而拜邵氏曰州仇奉甲從君者對王言拜者受之之禮使於齊子胥為吳王使於齊也古者兵交使在其間史記曰吳子使子胥於齊為王孫氏𫝊終言之亦猶夫槩王奔楚為堂谿氏也解謂改姓辟吳禍非十二年孔子與弔適季氏季氏不絻放絰而拜傅氏曰孔子與弔弔於公也適季氏弔畢而適季氏也見季孫之不絻則亦去其絰禮之稱也拜者賓主之拜也古者弔無拜禮從之固矣固如與人而不固之固十三年公㑹晉侯及吳子于黄池解夫差欲霸中國尊天子自去其僭號而稱子以告令諸侯故史承而書之非也四夷雖大皆曰子越子伐吳為二隧解隧道也按隧即古隊字十四年成子兄弟四乗如公傅氏曰四乗四人同乗也如文十一年富父終甥駟乗解云兄弟八人不必皆在十五年廢日共積陸氏曰共積為共給委積盖言倍日而行以二日之用為一日之用利不可得而喪宗國傅氏曰喪失也成魯宗室背魯出奔是喪宗國十六年使貳車反祏于西圃解西圃孔氏廟所在祏藏主石圅戴侗曰莊十四年先君桓公命我先人典司宗祏注宗廟中藏主石室也昭十八年鄭災使祝史遷主祏于周廟注廟主石圅也此注同按說文云祏宗廟主也周禮有郊宫石室一曰大夫以石為主今許公為得祏于橐中非石室亦非石圅矣十七年太子又使椓之陸氏曰椓字古與諑通吕氏春秋椓崔子之子使之爭裔焉大國滅之將亾當以裔焉大國為句言其邊於大國將見滅而亾十八年夏書曰官占唯能蔽志昆命于元龜今大禹謨二十一年唯其儒書以為二國憂傅氏曰二國齊魯二十三年以肥之得備彌甥也傅氏曰彌増也其可以稱旌繁乎傅氏曰稱副也馬以駕車車有旌旄仍以繁纓飾馬皆國君之服謙言可以稱此否二十六年申開守陴申如易申命之申二十七年三子皆從康子病之解恥從蠻夷盟慈溪黄氏曰非也盖康子恐其君借勢於越以去已與越將妻公康子納賂太宰嚭而止同意豈以盟蠻夷為恥哉公弔焉降禮陸氏曰過自貶屈故寡君使瑶察陳衷焉傅氏曰衷中也察其中見滅之由故韓魏反而喪之補云終陳成子之言自是晉益微至靖公三年韓魏趙三分其地靖公遷為家人左傳杜解補正卷下
