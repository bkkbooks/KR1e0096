body:
  text: 左傳杜解補正卷中崑山顧炎武撰文元年於是閏三月非禮也古人以閏為歲之餘凡置閏必在十二月之後故曰歸餘于終考經文之書閏月者皆在歲末文公六年閏月不告月猶朝于廟哀公五年閏月葬齊景公是也而左傳成公十七年襄公九年哀公十五年皆有閏月亦並在歲末是以經傳之文凡閏不言其月者言閏即歲之終可知也今魯改厯法置閏在三月故為非禮漢書律厯志曰魯厯不正以閏餘一之歲為蔀首是也又按漢書髙帝紀後九月師古曰秦之厯法應置閏者總致之於歲末此意當取左傳所謂歸餘於終耳何以明之據漢書表及史記漢未改秦厯之前屢書後九月是知厯法故然更伐之我辭之補云辭之者為之請平於晉君之齒未也而又多愛黜乃亂也補云言君之春秋富而内嬖多將來必有易樹之事則亂從之矣二年勇則害上不登於明堂朱鶴齡曰二語出汲冡周書大匡解書曰及晉處父盟以厭之也解厭猶損也未是傅氏曰厭臨也以尊臨卑如漢人所云厭勝之耳陳侯為衞請成于晉執孔達以說此即上所謂我辭之者也解不合宜刪是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也補云言僖公於文有父之親而閔公於僖有君之尊禮不敢以其所親加之於尊故引二詩為證廢六闗家語作置六闗注謂文仲置闗以稅行者故為不仁襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也即以僖公之薨為十一月亦甫及大祥耳未畢二十五月之數何得云諒闇已終解謬按此傳通言娶夫人之禮則可若在文公喪制未終而使卿納幣違禮拂經甚矣三年雨螽於宋解宋人以其死為得天祐喜而來告故書然則隕石退鷁豈亦喜而來告乎四年夏曹伯如晉㑹正㑹正即朝正也周之三月晉之正月襄二十二年隨於執事以㑹嵗終杜氏解曰朝正是也此解以正為政似因傳文夏字而曲為之說君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣解意太迂愚謂引詩盖取上帝監觀四方求民之莫之義言恐懼可以致福於是乎賦湛露則天子當陽諸侯用命也湛露之詩只是宴樂之意取此為興耳天子當陽言嚮明而治也解太巧五年臯陶庭堅十八年季孫行父所稱八凱有庭堅杜氏以為臯陶字羅泌以為六臯陶之後蓼庭堅之後陸氏据焦氏易林尨降庭堅為陶叔後謂二國皆臯陶後而庭堅則或以支子别封自為其國之祖故文仲並舉之也未詳孰是徳之不建民之無援徳之不建言二國不能自强於為善民之無援言中國諸侯不能恤小寡解非沈漸剛克補云漸書作潛六年樹之風聲陸氏曰樹立其風化聲教為之律度鍾律度量皆有一定之法以遺後嗣書所謂闗石和鈞王府則有者也晉人以難故欲立長君解立少君恐有難非也謂連年有秦狄之師楚伐與國先君愛之補云先君謂文公難必抒矣抒服䖍作紓杜祁以君故讓偪姞而上之補云君謂襄公七年宣子與諸大夫皆患穆嬴且畏偪畏穆嬴之偪也以君夫人之尊故解非敗秦師于令狐至于刳首水經注引闞駰曰令狐即猗氏刳首在西三十里後漢衞敬侯碑隂文城惟解梁地即郀首山對靈足谷當猗口刳字作郀玉篇郀口孤切秦地在河南當是河東之誤凡會諸侯不書所會後也後至不書其國辟不敏也補云公既不及於會則不知班位之次序故不書諸國以辟不敏夏書曰戒之用休今大禹謨八年致公壻池之封自申至于虎牢之境傅氏曰自申至於虎牢皆鄭地也不得致之於衞竊以上文言匡戚歸衞田也此言自申至虎牢歸鄭田也故杜於上年解云為晉歸鄭衞田張本而此則專言歸衞此杜氏之闕漏爾按自申至于虎牢鄭地晉取之以封公壻池今乃歸之傳文不言鄭言申虎牢則鄭可知矣九年獲公子茷按成十六年鄢陵之戰囚楚公子茷距此四十四年疑别是一人十年沿漢泝江將入郢補云欲入郢為亂十一年皇父之二子死焉傳本云皇父之二子解乃云榖甥牛父誤三大夫亦應有賞傳特以耏門之名追錄其受賞之由餘不及載耳齊襄公之二年鄋瞞伐齊按此年世太逺陸氏曰史記魯世家引此傳文作齊惠公之二年又齊世家曰惠公二年長翟來王子城父攻殺之十二諸侯年表亦於齊惠公二年書王子城父敗長翟三文皆同按惠之二年即魯宣公之二年也在晉滅潞之前僅十三年爾此傳以惠公為襄公盖傳寫之誤也因此知解云長三丈者亦未可信考工記曰戈柲六尺有六寸假如長三丈之人富父終甥何由得以戈樁其㗋邪云長翟之種絶者亦非傳云亾者特其國亾耳杜以後世不聞有長人故云種絶然張蒼長八尺餘父不滿五尺其子復長至其孫長止六尺餘豈可以此論邪十二年郕伯來奔劉原父曰此郕太子也魯以諸侯逆之即謂之郕伯而春秋又没其專土叛君之罪反謂之諸侯而尊之豈其然乎意者郕伯以去年卒太子今即位而不能自安遂出奔夫踰年即位則真郕伯矣以其日淺或謂之太子而左氏則誤以為太子出奔也且請絶叔姬而無絶昏公許之啖叔佐曰左氏事迹倒錯者甚多此文當在成四年把伯來朝歸叔姬故也之下誤書於此十三年晉侯使詹嘉處瑕以守桃林之塞上年晉人秦人戰於河曲注云在河東蒲坂縣南秦師夜遁復侵晉入瑕則瑕必在河外僖三十年注曰焦瑕晉河外五城之二邑水經河水又東逕湖縣故城北注云晉書地道記太康記並言胡縣漢武帝改作湖其北有林焉名曰桃林古瑕胡二字通用禮記引詩心乎愛矣瑕不謂矣鄭注云瑕之言胡也瑕胡音同故記用其字瑕轉為胡又改為湖今為闅鄉縣治瑕邑即桃林之塞而道元以為郇瑕之地誤矣不如隨會能邵氏曰能字句絶能言才也如孟子能者在職之能正義屬下文以為能處賤非按能字仍當屬下句能賤猶云為貴當可使復賤也子無謂秦無人吾謀適不用也補云傅氏曰盖繞朝曽言於秦伯請留之文子賦四月解云不欲還晉以傳考之但云成二國不言公復還晉四月之詩當取亂離瘼矣維以告哀之意耳十四年秋七月有星孛入於北斗解既見而後入北斗非也改云有者非常之辭孛妖星之有光芒者也如帚者則謂之彗劉向以為君臣亂於朝政令虧於下則上濁三光之精五星贏縮變色逆行甚則為孛北斗人君象孛星亂臣象簒弑之表也于大辰于東方皆不言入此其言入何榖梁子曰斗有環域也子叔姬妃齊昭公按僖二十七年經齊侯昭卒今此昭公即孝公之弟不當以先君之名為諡而經不書葬無可考正疑左氏之誤然僖公十七年傳曰葛嬴生昭公前後文同史記同先儒無致疑者不出七年宋齊晉之君皆將死亂劉歆曰斗天之三辰紀綱星也宋齊晉天子方伯中國綱紀故當之也斗七星故曰不出七年終不曰公曰夫己氏夫己氏猶言彼己之子十五年魯人以為敏傳以華孫辭宴為合於禮解失之十七年鹿死不擇音言其鳴急切莊子獸死不擇音郭象注曰野獸蹴之窮地意急情盡則和聲不至是也當從服䖍之說趙穿公壻池為質焉趙穿與池皆晉侯女壻故以為質十八年仲殺惡及視而立宣公殺視及叔仲惠伯不書亦諱之耳解非渾敦窮奇檮杌饕餮此與孟子四罪不同解云驩兜共工鯀恐未必然至縉雲氏有不才子則杜亦不能以三苗釋之矣四凶事當以虞書孟子為正鯀婞直以亾身其為人傲而自用則有之不至如所云檮杌也帝之殛之亦秪遏在羽山而已宣二年倒㦸而出之獲狂狡邵氏曰倒㦸猶倒戈也坐此遲緩反為鄭人所獲戎昭果毅以聽之之謂禮邵氏曰聽猶聽政之聽解謂常存於耳似迂文馬百駟丘光庭曰文馬馬之毛色有文采者觸槐而死麑退而觸槐則非趙盾庭槐明矣解可刪六年使疾其民以盈其貫將可殪也劉炫曰以繩穿物謂之貫書云商罪貫盈言紂之為惡如物之滿於貫也殪殺也解非八年楚為衆舒叛故伐舒蓼滅之解舒蓼二國名羅泌曰僖三年徐取舒文五年楚滅蓼今云舒蓼者當自是一國名傅氏曰此盖羣舒之一如舒庸舒鳩之屬九年孔子曰詩云民之多辟無自立辟其􅂥冶之謂乎以上辟為僻下辟為法當時有此解昭二十八年晉司馬叔游引此詩亦同漢張衡思𤣥賦覽蒸民之多僻兮畏立辟以危身正用此也家語孔子曰􅂥冶之于靈公位在大夫無骨肉之親懐寵不去仕於亂朝以區區之一身欲正一國之婬昏死而無益可謂捐矣十年公孫歸父帥師伐邾取繹繹注已見文十三年此重出按文十三年傳曰邾文公遷于繹然則此之取繹豈取其國都乎盖文公雖遷後復還其故都耳十一年使封人慮事慮籌度也解非其從之也補云言徃而會狄十二年使改事君夷於九縣九縣莊十四年滅息十六年滅鄧僖五年滅弦十二年滅黄二十六年滅䕫文四年滅江五年滅六滅蓼十六年滅庸又有武王滅權文王滅申凡十一國傅氏曰時楚適有九縣故鄭願得比之言服事恭謹如其縣邑耳非必追記其所滅之國也軍行右轅左追蓐前茅慮無中權後勁傅氏曰言楚分其三軍為五部而使之各專其職有律以如己也故曰律否臧且律竭也盈而以竭夭且不整所以凶也傅氏曰將師之貴於法律者能使其下如己之志故謂之律所謂順成而臧也否臧則律且竭而敗矣夭屈也言其法律如水之壅而盈則必竭屈而不伸散而不整故為凶其君之戎分為二廣其君之戎謂戎車傅氏曰廣楚乗車名以其親兵分左右二部故名二廣廣有一卒卒偏之兩邵氏曰楚人易古偏法而為廣廣之所有百人故曰一卒亦古偏法也一卒之外又有承副之卒焉其數如偏之兩兩二十五人也廣之所有一卒一卒百人也一卒之外又有餘卒為承副者二十五人為兩故曰卒偏之兩車法在古為偏在今為廣盖舉古今錯言之不直曰若干人而必曰卒曰偏曰兩者今法不離於古也内官序當其夜邵氏曰若今宿直遞持㪅也御下兩馬掉鞅而還邵氏曰兩馬掉鞅掉兩馬之鞅也盖驂馬車旋則其鞅須掉之而示閒暇之意亦在其中矣士季使鞏朔韓穿帥七覆于敖前故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟傳因士季語竟言之楚子為乗廣三十乗分為左右傅氏曰兵法車十五乗為偏今楚用舊法而易其名屈蕩户之户止也古人以守戸之人謂之户者取其能止人也漢書樊噲傳詔戸者無得入羣臣王嘉傳坐户殿門失䦨免唐書李紳傳擊大毬户官道車馬不敢前楚人惎之定四年管蔡啓商惎間王室解惎毒也傅氏曰言楚人將毒害之而晉人乃脫扄拔斾投衡而出耳未詳按杜解惎為教於義為長盖晉人困厄而楚人顧教之脫險既脫而復有謔言故傳書之以紀異若如傅氏說則軍中常事何可勝書且末語尤無謂矣宵濟亦終夜有聲言其軍囂無復部伍解非遂圍蕭蕭潰下有明日蕭潰之文此處疑衍若此云蕭潰下便不得言遂傅于蕭也十三年君子曰清丘之盟唯宋可以免焉邵氏曰清丘晉與宋衞盟既而衞背盟而救陳晉背盟而不救宋故曰唯宋可免責晉衞也十四年過我而不假道鄙我也鄙我猶言輕我楚子聞之投袂而起屨及於窒皇劒及于寢門之外車及于蒲胥之市邵氏曰寢門之外逺於窒皇蒲胥之市逺于寢門之外屨人進屨追而及於窒皇前此未及屨也劒人進劒追而及於寢門之外前此未及劒也車人駕車追而及於蒲胥之市前此未及車也盖興師之速如此聘而獻物於是有庭實旅百劉炫曰實百品于庭以為獻物十五年使華元夜入楚師登子反之牀傅氏曰華元登牀乗其不虞刼之與盟也子反懼與之盟而告王邵氏曰子反何為而懼懼華元之脅也盟豈得已哉觀懼之一言則華元之情狀可見矣論者謂其輕見情實殆非知華元者吾從其治也治謂病間之時凡人病未昏酒未醉皆曰治列子鄧析謂子產曰子奚不時其治也謂伺其醒時爾用先人之治命石經作爾用而先人之治命十六年夏成周宣榭火吕大臨考古圖􅌏敦銘曰王格于宣榭宣榭者盖宣王之廟也榭射堂之制也其文作印古射字執弓矢以射之象因名其堂曰射後從木其堂無室以便射事故凡無室者皆謂之榭爾雅云宣王之廟制如榭故謂之宣榭春秋記成周宣榭火以宗廟之重而書之如桓僖宫之比二傳云藏禮樂之器非也十七年過而不改而又乆之以成其悔何利之有焉傅氏曰言三子見執齊人必悔有遣使之心今又乆之必將背晉成元年作丘甲周制四丘為甸旁加一里為成共出長轂一乗步卒七十二人甲士三人則丘得十八人不及一甲今作丘甲令丘出二十五人一甸之中共出百人矣解云丘出甸賦驟増三倍恐未必然山堂考索載唐太宗問李靖楚廣與周制如何靖曰周制一乗步卒七十二人甲士三人亦二十五人為甲凡三甲共七十五人然則一丘所出十有八人積四丘具一乗則今作丘甲者即丘出一甲向之十有八人者今増而為二十五人是一甸之中共百人為軍矣所未可知者其三甸而増一乗乎抑每乗而増一甲乎魯昭公時嘗蒐于紅革車千乗則計甸而増乗未可知也楚人二廣之法一乗至用百五十人則魯每乗而増一甲亦未可知也要之其實為益兵向之四丘共出三甲者今使每丘出一甲爾非若杜氏之所謂丘出一甸之賦二年與先大夫之肅先大夫謂原軫狐偃欒枝之輩三周華不注補云華不注在今山東濟南厯城縣東北下有華泉傷而匿之在軍中不敢言病故匿其傷物土之宜而布其利陸氏曰如昭三十二年傳物土方之物謂相土之所宜畏君之震震威也敝邑之幸亦云從也况其不幸敢不唯命是聽言即幸而勝亦從晉命况於不幸遂常以葬補云以喪禮有進無退三年叔孫僑如圍棘僑如解宜在二年戰于鞌下四年楚雖大非吾族也言蠻夷六年韓獻子將新中軍且為僕大夫為僕大夫則君之親臣故獨令之從公而入寢庭也其惡易覯陸氏曰言垢穢易見且民從教言馴習於上之教令七年子重請取于申吕以為賞田王應麟曰國語史伯曰當成周者南有申吕漢地理志南陽宛縣申伯國詩書及左氏解不言吕國所在史記正義引括地志云故吕城在鄧州南陽縣西徐廣云吕在宛縣水經注亦謂宛西吕城四嶽受封然則申吕漢之宛縣也以兩之一卒適吳舎偏兩之一焉傅氏曰古人一車謂之一兩詩百兩御之孟子革車三百兩非二十五人為兩之兩也盖楚廣之制本用一卒故云以兩之一卒其云舎偏兩之一者車之半邊為偏偏五十人今留二十五人也八年唯或思或縱也陸氏曰有思開封疆者有縱弛而不設備者故多兼并以成大國十年忠為令徳非其人猶不可况不令乎陸氏曰非其人謂叔申本非賢者雖欲效忠不見信於君適以自害耳按叔申既忠於鄭何以見其非賢者杜解不得其人較勝十二年及其亂也諸侯貪冐侵欲不忌爭尋常以盡其民略其武夫以為己腹心股肱爪牙傅氏曰世治尚文徳武夫惟使之在外扞難故曰干城世亂尚武力公侯用武夫侵暴鄰國以為搏噬之用故委任之無所不至天下有道則公侯能為干城而制其腹心傅氏曰言能制御武夫之腹心者使不為害晉侯及楚公子罷盟于赤棘赤棘解見元年此重出十三年能者養之以福陸氏曰漢書律厯志引此語作能者養以之福顔師古注之徃也徃就福也孔頴逹左傳正義亦云徃適於福也盖古本如此姚寛西溪叢語曰玩注亦當是養以之福傳本誤也今本作養之以福謂養之以致福耳於義亦通但杜顔注此云養威儀以致福則恐非是竊謂養是養所受之中盖敬慎於動作威儀之間乃所以養此中耳楊用修引漢酸棗令劉熊碑辭猗與明哲秉道之樞養以之福惟徳之隅斯是用痛心疾首暱就寡人一篇之中稱寡君者三我君者一寡人者五當是屬文之時未曽參訂然古人之文亦徃徃不拘如文十七年傳鄭子家與趙宣子書前稱寡君後云夷與孤之二三臣亦其類也十六年徳刑詳義禮信正義曰詳祥也古字同李巡曰祥福之善也致死以補其闕陸氏曰軍國之事有所闕乏解非邲之師荀伯不復從謂不復從事於楚解非南國䠞易以外卦為南明夷之九三曰明夷於南狩是也復一陽浸長而至於乾有南國䠞之象敗者壹大我不如子敗者壹大恐君之不免也我不如子子之才能以君免也解謂軍大崩為壹大及御與車右不同者非不亦識乎邵氏曰識記也謂其能記往日好整好暇之言若之何憂猶未弭謂君薨太子殺夏書曰怨豈在明不見是圗今五子之歌十七年施氏卜宰施氏之家臣也如論語仲弓為季氏宰之宰解冢宰非孟姬之讒吾能違兵傅氏引晉語注曰違其兵難卒存趙氏十八年不然而收吾憎使贊其政林氏曰吾憎謂吾所憎之人襄二年官命未改陸氏曰官命猶言公命三年克鳩兹至於衡山疑即丹陽縣之衡山今名横山去鳩兹不逺四年定姒薨不殯於廟無櫬不虞啖叔佐曰此傳誤宜在定十五年姒氏卒下按如啖說則季文子當作桓子靡奔有鬲氏杜氏曰靡夏遺臣事羿者仁山金氏遂以為左氏之誤今按此文亦未見靡之事羿盖夏后相之將亡而靡乃出奔爾古人之文或以二事連屬言之然寒浞先殺羿而後滅相則亦未為謬也有窮由是遂亾解云浞因羿室不改有窮之號非也哀元年稱有過澆矣此特承上死於窮門而言以結所引夏訓之文爾戎狄薦居貴貨易土土可賈焉補云國語曰與之貨而獲其土五年已則無信而殺人以逞不亦難乎共王不謀於衆背晉之盟以亾師於鄢遂失諸侯不知自反八年之中戮殺三卿是失刑也夏書曰成允成功今大禹謨六年子罕善之如初傅氏曰子蕩已出子罕不復追其射門之怨若趙盾之於賈季也七年衡而委蛇必折傅氏曰委蛇自得之貌順道則可以自得横不順道而妄焉自得必毁折矣八年如匪行邁謀是用不得於道詩箋云不行而坐圖逺近故不得於道路也此解曰匪彼也行邁謀謀於路人也不得於道衆無適從按詩上文云謀夫孔多是用不集發言盈庭誰敢執其咎則此解為長古人有以匪字作彼字用者二十七年引詩彼交匪敖作匪交匪敖九年古之火正或食於心或食於咮以出内火漢書五行志曰古之火正謂火官也掌祭火星行火政季春昏心星出東方而咮七星鳥首正在南方則用火季秋心星伏在日下則止火以順天時救民疾帝嚳則有祝融堯時則有閼伯民賴其徳死則以為火祖配祭火星故云或食於心或食於咮也相土商祖契之曽孫代閼伯後主火星宋其後也世司其占故先知火災賢君見變能修道以除凶亂君無象天不譴告故不可必也遇艮之八陸氏曰劉禹錫稱董生之說曰揲蓍者九與六為老老為變爻七與八為少少為定位國語晉公子筮得貞屯悔豫皆八八非變爻故不曰有所之穆姜筮遇艮之八史曰是謂艮之隨夫艮之隨唯二不動斯遇八也餘五位皆九六故反焉筮法以少為卦主若定者五而變者一即宜曰之某卦觀之否師之臨之類是也今變者五定者一宜從少占艮之六二曰艮其腓不拯其隨我心不快史以遇此為不利故從變爻而占曰是謂艮之隨茍以悅於姜耳而杜元凱以為襍用三易故有遇八之云非也傅氏曰艮五爻皆變唯二得八不變之隨筮法五爻皆變則占之卦定爻得隨之六二係小子失丈夫是明示穆姜以通於僑如之穢姜亦自知之而以彖辭為說也肆眚圍鄭正義曰赦諸侯之軍犯法者以先君之祧處之鶴山魏氏曰祧者取廟外之兆域為義祧即廟也昭元年其敢愛豐氏之祧豐氏僅大夫兩世未有逺祖也輸積聚以貸傅氏曰輸者以車輦運其物四出以就民所居而貸之也十年請以桑林宋洪氏容齋四筆引吕氏春秋云武王勝殷立成湯之後於宋以奉桑林髙誘注曰桑山之林湯所禱也故使奉之淮南子云湯旱以身禱於桑山之林許叔重注曰桑山之林能興雲致雨故禱之陸氏曰莊子有桑林之舞則桑林者樂名也楚令也猶云從楚之盟故也解云亦兼受楚之敕命者非諸侯之師還鄭而南還與環同猶將退也邵氏曰猶言同一將退也牲用備具傅氏曰牲犧牲用器用十一年政將及子子必不能解謂魯次國而為大國之制貢賦必重故憂不堪非也謂魯國之政將歸於季孫以一軍之征而供霸國之政令將有所不給則必改作其後四分公室而季氏擇二盖亦不得已之計叔孫固已豫見之矣孟氏使半為臣若子若弟若猶或也邵氏曰於三分得一之中使半為臣臣其子則父歸公臣其弟則兄歸公所謂半也十二年吳子壽夢卒夢古音莫騰反一言為乗二言為壽夢非號也解可刪夫婦所生若而人若而人猶言某某十三年唯是春秋窀穸之事所以從先君於禰廟者窀穸墓穴也古者既葬而諡故以為言楚人歸之補云良霄果亂鄭十四年晉之百役與我諸戎相繼於時邵氏曰役無虛時故曰相繼於時子叔齊子齊子叔老諡也解作字盖傳寫之誤於是齊崔杼宋華閱仲江㑹伐秦不書惰也二國大夫後濟解云惰慢未明暴妾使余邵氏曰視嫡母如妾而使之加虐余不說初矣邵氏曰初從之出不得已耳今悔焉故逃是不說初也自王以下各有父兄子弟補云所謂貴戚之卿商旅於市百工獻藝邵氏曰此二句承庶人謗而言旅於市陳其所尚之物而言從之是亦為諫也屨賤踊貴之類是已獻藝工執藝以諫也十六年書曰㑹鄭伯為夷故也傅氏曰不使鄭伯夷於大夫也解非十七年唯卿為大夫邵氏曰王制諸侯之上大夫卿又曰父母之喪無貴賤一也齊疏之服飦粥之食自天子逹今曰禮卿大夫士異何居斯禮也周其衰矣衞幕布魯幕綃魯衞之所謂禮也非三代之通禮也晏子之老所謂大夫之禮者亦然其曰唯卿為大夫姑就其言以答之也十八年塹防門而守之廣里解云故經書圍非也圍者圍齊也非圍防門也楚師伐鄭次于魚陵解魚陵魚齒山也在南陽犨縣北鄭地范守己曰案上文言子庚治兵於汾注云襄城縣東北有汾丘城兹乃謂魚陵為魚齒山在南陽豈子庚治兵于襄城及欲伐鄭乃南還走南陽邪然則魚陵之不為魚齒山明甚况下文又言魚齒山何故於此言魚陵邪至于梅山若在密縣東北則是新鄭西北矣左氏何以云右囘梅山侵鄭東北也十九年夫銘天子令徳令猶令龜之令言以徳布於銘也齊侯娶於魯曰顔懿姬無子其姪鬷聲姬解云顔鬷皆姬母姓非也當云母氏諸子仲子戎子房𤣥齡注管子曰諸子内官之號杜氏盖未之考故以為諸妾姓子者至哀五年諸子鬻姒之子荼嬖則又以為庶公子皆非二十一年季武子以公姑姊妻之邵氏曰姑姊一人也其殆魯之宗女於成為妹者乎故曰以姬氏妻之稱姊尊之也夏書曰念兹在兹今大禹謨子離於罪其為不知乎譏其不能保身書曰聖有謨勲明徴定保今𦙍征得罪於王之守臣守臣謂晉侯玉藻諸侯之於天子曰某土之守臣某是也解非莊公為勇爵陸氏曰爵酒器也設之以觴勇士二十二年見於嘗酎傅氏曰嘗秋祭酎三重醇酒甞而以酎薦祖考曰嘗酎漢書景帝紀髙廟酎張晏曰正月旦作酒八月成名曰酎武帝紀酎金服䖍曰因八月獻酎祭宗廟時使諸侯各獻金來助祭今觀此𫝊則知古有嘗酎助祭之禮而漢因之也無昭惡也無昭子明之惡二十三年禮為鄰國闕把孝公晉平公之舅尊同不降當服緦麻三月言鄰國之喪且猶徹樂而况於母之兄弟乎納諸曲沃傅氏曰曲沃晉祖廟所在盖諸卿分掌公邑而此邑屬欒氏注以為欒盈邑按晉世家至幽公時微極矣獨有絳曲沃則平公之世未嘗以宗邑與人也我實不天子無咎焉言雖事不集而死乃我自不為天所祐非子之咎也解非陳文子見崔武子解文子陳完之孫須無按史記世家乃完之曽孫張武軍於熒庭今翼城縣東南七十五里有熒庭城水經注紫谷水西逕熒庭城南戍郫邵今濟源縣西一百二十里有邵原闗唐武徳二年置邵原縣按郫邵當是二地計其相去亦不甚逺文公六年賈季使召公子樂于陳趙孟使殺諸郫封少水水經注引京相璠曰少水今沁水也二十四年在周為唐杜氏竹書紀年成王八年冬十月王師滅唐遷其民于杜踞轉而鼓琴傅氏曰轉當為軫詩小戎俴收注收軫也謂車前後兩端横木踞之可以鼓琴二十五年風隕妻不可娶也陸氏曰當以風隕妻為句言夫既從風風能隕妻將庸何歸東山趙氏曰即覆說上文君死安歸之意及處守者皆有賂解云皆以男女為賂非成公播蕩又我之自入辰陵之盟鳩藪澤陸氏曰若周官澤虞使其地之人守其財物以入之於王表淳鹵陸氏曰淳鹵地宜鹹者按上下皆以二字成文未解淳為何等之地詩所謂我躬不說皇恤我後者谷風小弁皆有此文說詩作閱皇詩作遑書曰慎始而敬終終以不困今蔡仲之命二十六年吾子獨不在寡人在如乃心罔不在王室之在解非晉卿不如楚其大夫則賢皆卿材也如宋之盟趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對是也夏書曰與其殺不辜寧失不經今大禹謨晉人將與之縣以比叔向陸氏曰令其禄秩比叔向解非君子是以知平公之失政也補云討罪而取其女且同姓故二十七年公喪之如稅服終身傅氏曰諸侯絶期無兄弟之服今獻公獨為此服者痛子鮮之甚也陸氏曰稅如字禮日月已過聞喪而追服謂之稅仲尼使舉是禮也以為多文辭沈氏曰舉謂記錄之也單斃其死言未有不亾且吾因宋以守病則夫能致死與宋致死雖倍楚可也邵氏曰入于宋則因宋以守也病謂楚攻而病也夫猶言人人也言人人能致死與人同力故可以倍楚守字句絶按夫猶彼也謂宋也何以恤我我其收之周頌二十八年使諸亾人得賊者以告而反之邵氏曰亾人謂莊公之黨崔氏名之為賊者也得賊以告猶今律所謂能自捕得者也不然何從而知之何從而反之陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車於莊文子曰可慎守也已邵氏曰此三言者陳氏父子為隱語以相諭也知禍將作而以何得問其子既得得木之對則知其知所從違矣故以慎守堅之守謂守志非守其木愚謂木者作室之良材莊者國中之要路言將代之執齊國之權國人猶知之皆曰崔子也言其尸真二十九年乃使巫以桃茢先祓殯鄭氏周禮注茢苕帚先君若有知也不尚取之服䖍曰不尚尚也言先君當取叔侯於地下治之猶未也言王化局於一方猶未大行也是其衞風乎言三國同是衞風國未可量也服氏曰言其國之興衰世數長短未可定也其周徳之衰乎猶有先王之遺民焉服䖍以為此謂變小雅也華陽范氏曰二雅篇數多當時樂工或間歌其一二季子因就所聞而評之也盛徳之所同也商周同此盛徳非必及魯見舞象箾南籥者補云孔氏曰維清奏象舞也即此象箾之舞程大昌曰南籥者二南之籥鼓鐘之詩所謂以雅以南以籥不僭者也勤而不徳不矜不伐是勤而不徳也美哉猶有憾猶未洽於天下是以免於欒髙之難解難在昭八年當作十年三十年其季於今三之一也季猶畸也按季猶末也指最後甲子而言亥有二首六身下二如身是其日數也邵氏曰二首亥字上二畫也六身亥字中三畫也三畫而謂之六者其形如算之六也下二如身謂下二畫亦如算之六故曰如身盖古字體如此絳老既為隱語師曠史趙因之師曠以故事史趙以字畫皆隱語也按下二如身當從杜解下亥上二畫竪置身旁邵解六身亦未當盖古文亥下三曲皆如布算之六計為二者一為六者三故成二萬六十六百六旬也譆譆出出傅氏曰說文譆痛也唯君用鮮衆給而已陸氏曰殺新為鮮傅氏曰衆給者不必用鮮惟物之足而已取我衣冠而褚之陸氏曰褚衣之橐也莊子曰褚小者不可以懐大按傳成三年鄭賈人有將寘諸褚中以出是也三十一年我問師故問齊人用師之故解魯以師徃非民之所欲天必從之今泰誓有此文豈不遽止遽亟也左傳杜解補正卷中
