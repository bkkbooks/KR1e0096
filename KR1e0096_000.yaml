body:
  text: 左傳杜解補正春秋類提要臣等謹按左傳杜解補正三卷國朝顧炎武撰炎武一名絳字寧人崑山人博極羣書精於考證國初稱學有根柢者以炎武為最李光地嘗為作小傳今載榕村集中是書以杜預左傳集解時有缺失而賈逵服䖍之注樂遜之春秋序義今又不傳於是博稽載籍作為此書至邵寶左觽等書茍有合者亦皆采輯若室如懸罄取諸國語肉謂之羮取諸爾雅車之有輔取諸吕覽田祿其子取諸楚詞千畝原之在晉州取諸鄭康成祏為廟主取諸說文石四為鼓取諸王肅家語注祝其之為萊蕪取之水經注凡此之類皆有根據其他推求文義研究詁訓亦多得左氏之意昔隋劉炫作杜解規過其書不𫝊惟散見孔頴達正義中然孔疏之例務主一家故凡炫所規皆遭排斥一字一句無不劉曲而杜直未協至公炎武甚重杜解而又能彌縫其闕失可謂掃除門户能持是非之平矣近時惠棟作左傳補注糾正此書尨凉一條大司馬固一條文馬百駟一條使封人慮事一條遇艮之八一條豆區釡鍾一條然其中文馬之說究以炎武為是棟又摘其引古春秋左氏說但舉漢書五行志之名又摘其禮為鄰國闕一條用服䖍之說而不著所自案徵引佚書當以所載之書為據棟引世本不標史記注引京相璠土地名不標水經注正體例之疏未可反譏炎武至服䖍一條當由偶忘出典棟注昭公二十九年賦晉國一鼓鐵證以王肅家語注亦明馮時可之說未標時可之名也是固不以掠美論矣乾隆四十九年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:02eb923c1e88b6f93f850a6c5a5d39450e633b0f05d72e8ba52250f3e92edaef
